apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/component: gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-storage
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw
              chown -R 1000:1000 /home/node/.openclaw /tmp
              chmod 1777 /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: HOME
              value: /home/node
            - name: NODE_OPTIONS
              value: --max-old-space-size=1536
            - name: OTEL_SERVICE_NAME
              value: openclaw
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=Openclaw
          envFrom:
            - secretRef:
                name: openclaw-secrets
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: gateway
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true
            - name: openclaw-config
              mountPath: /home/node/.openclaw/AGENTS.md
              subPath: AGENTS.md
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: tmp
          emptyDir: {}
