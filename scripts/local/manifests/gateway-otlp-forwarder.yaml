apiVersion: v1
kind: ConfigMap
metadata:
  name: __LOCAL_OTEL_FORWARDER_NAME__
  namespace: __LOCAL_OTEL_FORWARDER_NAMESPACE__
data:
  otelcol.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:__LOCAL_OTEL_FORWARDER_HOST_PORT__

    processors:
      batch:

    exporters:
      otlphttp:
        endpoint: __LOCAL_OTEL_FORWARDER_TARGET_ENDPOINT__

    extensions:
      health_check:
        endpoint: 0.0.0.0:__LOCAL_OTEL_FORWARDER_HEALTH_PORT__

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __LOCAL_OTEL_FORWARDER_NAME__
  namespace: __LOCAL_OTEL_FORWARDER_NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __LOCAL_OTEL_FORWARDER_NAME__
  template:
    metadata:
      labels:
        app: __LOCAL_OTEL_FORWARDER_NAME__
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: otel-forwarder
          image: __LOCAL_OTEL_FORWARDER_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/otelcol.yaml
          ports:
            - name: otlp-http
              containerPort: __LOCAL_OTEL_FORWARDER_HOST_PORT__
            - name: health
              containerPort: __LOCAL_OTEL_FORWARDER_HEALTH_PORT__
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: __LOCAL_OTEL_FORWARDER_NAME__
---
apiVersion: v1
kind: Service
metadata:
  name: __LOCAL_OTEL_FORWARDER_NAME__
  namespace: __LOCAL_OTEL_FORWARDER_NAMESPACE__
spec:
  selector:
    app: __LOCAL_OTEL_FORWARDER_NAME__
  ports:
    - name: otlp-http
      port: __LOCAL_OTEL_FORWARDER_HTTP_PORT__
      targetPort: otlp-http
